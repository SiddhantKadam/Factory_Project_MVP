<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PO Tracker — Screens</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          mono: ['ui-monospace', 'SF Mono', 'SFMono-Regular', 'Menlo', 'Consolas', 'Roboto Mono', 'monospace'],
        },
      },
    },
  };
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; background: #F4F4F2; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  * { -webkit-font-smoothing: antialiased; }

  /* analyse scan animation */
  .po-scanline {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #C2410C, transparent);
    animation: po-scan 1.8s ease-in-out infinite;
  }
  .po-scanglow {
    position: absolute; left: 0; right: 0; height: 40px;
    background: linear-gradient(180deg, rgba(194,65,12,0.10), transparent);
    animation: po-scan 1.8s ease-in-out infinite;
  }
  @keyframes po-scan {
    0%   { top: 6%;  opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { top: 92%; opacity: 0; }
  }
  .po-progress { animation: po-pulse 1.6s ease-in-out infinite; }
  @keyframes po-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.78; } }
  .po-spin { animation: po-rot 0.9s linear infinite; transform-origin: center; }
  @keyframes po-rot { to { transform: rotate(360deg); } }
  .po-toast { animation: po-rise 0.22s ease-out; }
  @keyframes po-rise { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* tidy native date inputs */
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app/shell.jsx"></script>
  <script type="text/babel" src="app/screen-a.jsx"></script>
  <script type="text/babel" src="app/screen-b.jsx"></script>
  <script type="text/babel" src="app/screen-detail.jsx"></script>
  <script type="text/babel" src="app/screen-review.jsx"></script>
  <script type="text/babel" src="app/screen-new-po.jsx"></script>
  <script type="text/babel" src="app/root.jsx"></script>
</body>
</html>
